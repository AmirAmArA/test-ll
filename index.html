  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6e8289b3-7da4-4366-afbb-81a3f82400b5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"050bca57-f4b7-4787-bdae-9f8de00856f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"25d8a4bd-579f-40ab-8e1a-3cea25a3e56a\"><\u002Fscript>\n<style>\n  :root {\n    --primary:#1F4E79; --primary-hover:#2E75B6; --primary-deep:#173B5C;\n    --accent:#BF8F00; --accent-hover:#A87D00;\n    --ok:#548235; --ok-soft:#EAF1E0; --ok-border:#C8DAB6;\n    --gold-soft:#FBF4DF; --gold-border:#EAD9A1;\n    --bg:#FAFAF7; --surface:#fff; --line:#E5E5E0; --line-strong:#D4D4CE;\n    --ink:#1A1A1A; --ink-2:#595959; --ink-3:#8C8C8C;\n    --navy-soft:#E8F0F8; --navy-border:#C9DDED;\n  }\n  * { box-sizing:border-box; }\n  html, body { margin:0; background:var(--bg); color:var(--ink); font-family:'Heebo','Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }\n  a { color:inherit; }\n\n  /* TOP NAV */\n  .nav {\n    position:sticky; top:0; z-index:50;\n    background:rgba(250,250,247,0.88); backdrop-filter:blur(10px);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner { max-width:1280px; margin:0 auto; height:64px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; }\n  .wordmark { display:flex; align-items:center; gap:10px; font-weight:700; font-size:20px; letter-spacing:-0.01em; text-decoration:none; color:var(--ink); }\n  .wordmark .glyph { width:32px; height:32px; border-radius:7px; background:var(--primary-deep); display:grid; place-items:center; }\n  .wordmark .glyph::after { content:''; width:11px; height:11px; background:var(--accent); border-radius:2px; }\n  .wordmark .dot { color:var(--accent); }\n  .nav-links { display:flex; align-items:center; gap:28px; }\n  .nav-links a { color:var(--ink-2); font-size:14px; text-decoration:none; }\n  .nav-links a:hover { color:var(--ink); }\n  .nav-cta { display:flex; align-items:center; gap:8px; }\n\n  /* Buttons */\n  .btn { display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 16px; border-radius:8px; font-family:inherit; font-size:14px; font-weight:500; border:none; cursor:pointer; text-decoration:none; transition:.15s; }\n  .btn-primary { background:var(--primary); color:#fff; }\n  .btn-primary:hover { background:var(--primary-hover); }\n  .btn-accent { background:var(--accent); color:#fff; }\n  .btn-accent:hover { background:var(--accent-hover); }\n  .btn-ghost { background:#fff; border:1px solid var(--line-strong); color:var(--ink); }\n  .btn-ghost:hover { background:#F2F2EE; }\n  .btn-lg { height:48px; padding:0 22px; font-size:15px; }\n  .btn-sm { height:32px; padding:0 12px; font-size:13px; }\n\n  /* HERO */\n  .hero { padding:96px 24px 64px; }\n  .hero-inner { max-width:1280px; margin:0 auto; }\n  .eyebrow { display:inline-flex; align-items:center; gap:8px; font-family:ui-monospace,monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); margin-bottom:18px; }\n  .eyebrow .dash { width:24px; height:1px; background:var(--accent); }\n  h1.hero-title { font-size:64px; line-height:1.05; font-weight:700; letter-spacing:-0.02em; margin:0 0 22px; max-width:920px; }\n  h1.hero-title .accent-mark { box-shadow: inset 0 -14px 0 var(--gold-soft); padding:0 4px; }\n  .hero-sub { font-size:19px; line-height:1.55; color:var(--ink-2); max-width:680px; margin:0 0 32px; }\n  .hero-meta { display:flex; flex-wrap:wrap; align-items:center; gap:24px 36px; margin-top:36px; padding-top:28px; border-top:1px solid var(--line); }\n  .hero-stat { display:flex; flex-direction:column; gap:2px; }\n  .hero-stat .num { font-size:28px; font-weight:700; letter-spacing:-0.01em; color:var(--ink); }\n  .hero-stat .lbl { font-size:12px; color:var(--ink-3); font-family:ui-monospace,monospace; text-transform:uppercase; letter-spacing:.08em; }\n\n  @media (max-width:780px) { h1.hero-title { font-size:42px; } .hero-sub { font-size:17px; } .hero { padding:64px 24px 48px; } }\n\n  /* SECTION HEADERS */\n  .sec { padding:72px 24px; }\n  .sec-inner { max-width:1280px; margin:0 auto; }\n  .sec-head { margin-bottom:40px; display:flex; align-items:end; justify-content:space-between; gap:24px; flex-wrap:wrap; }\n  .sec-head h2 { font-size:34px; font-weight:600; letter-spacing:-0.01em; margin:8px 0 0; max-width:560px; line-height:1.15; }\n  .sec-head p { font-size:15px; color:var(--ink-2); max-width:520px; margin:8px 0 0; line-height:1.55; }\n\n  /* SCREEN GRID */\n  .screens-grid {\n    display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));\n    gap:28px;\n  }\n\n  .screen-card {\n    background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden;\n    display:flex; flex-direction:column;\n    transition:.2s; text-decoration:none; color:inherit;\n    box-shadow:0 1px 2px rgba(0,0,0,0.03);\n  }\n  .screen-card:hover {\n    border-color:var(--line-strong);\n    transform:translateY(-3px);\n    box-shadow: 0 12px 28px -8px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.03);\n  }\n  .screen-card .preview {\n    height:240px; background:#F2F2EE; position:relative; overflow:hidden;\n    border-bottom:1px solid var(--line);\n  }\n  .screen-card .preview iframe {\n    position:absolute; top:0; left:0;\n    width:200%; height:200%;\n    border:0;\n    transform:scale(0.5);\n    transform-origin:top right;\n    pointer-events:none;\n    background:#fff;\n  }\n  .screen-card .preview .preview-mask {\n    position:absolute; inset:0; pointer-events:none;\n    background:linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.04));\n  }\n  .screen-card .body { padding:18px 20px 20px; flex:1; display:flex; flex-direction:column; }\n  .screen-card .num { font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-3); letter-spacing:.1em; }\n  .screen-card .title { font-size:18px; font-weight:600; margin:6px 0 4px; letter-spacing:-0.01em; }\n  .screen-card .desc { font-size:13px; color:var(--ink-2); line-height:1.55; }\n  .screen-card .meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }\n  .chip { display:inline-flex; align-items:center; gap:5px; height:22px; padding:0 9px; border-radius:999px; font-size:11px; font-weight:500; background:#F2F2EE; color:var(--ink-2); border:1px solid var(--line); }\n  .chip.navy { background:var(--navy-soft); color:var(--primary); border-color:var(--navy-border); }\n  .chip.gold { background:var(--gold-soft); color:#6B5000; border-color:var(--gold-border); }\n  .chip.ok { background:var(--ok-soft); color:#3F6526; border-color:var(--ok-border); }\n  .open-link { margin-inline-start:auto; font-size:12px; font-weight:500; color:var(--primary); display:inline-flex; align-items:center; gap:4px; }\n  .open-link i { width:13px; height:13px; }\n\n  /* PRINCIPLES */\n  .principles { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; }\n  .principle {\n    border:1px solid var(--line); border-radius:12px; padding:22px; background:#fff;\n  }\n  .principle .ico { width:36px; height:36px; border-radius:8px; background:var(--navy-soft); color:var(--primary); display:grid; place-items:center; margin-bottom:14px; }\n  .principle .ico i { width:18px; height:18px; }\n  .principle h3 { font-size:15px; font-weight:600; margin:0 0 6px; }\n  .principle p { font-size:13px; color:var(--ink-2); line-height:1.55; margin:0; }\n\n  /* TIMELINE */\n  .flow {\n    display:grid; grid-template-columns:repeat(5, 1fr); gap:0;\n    border:1px solid var(--line); border-radius:14px; overflow:hidden; background:#fff;\n  }\n  .flow-step { padding:22px 18px; border-inline-end:1px solid var(--line); position:relative; }\n  .flow-step:last-child { border-inline-end:none; }\n  .flow-step .step-num { font-family:ui-monospace,monospace; font-size:10px; color:var(--ink-3); letter-spacing:.12em; }\n  .flow-step h4 { font-size:14px; font-weight:600; margin:6px 0 4px; }\n  .flow-step p { font-size:12px; color:var(--ink-2); margin:0; line-height:1.5; }\n  .flow-step .dot { position:absolute; top:50%; inset-inline-start:-5px; transform:translateY(-50%); width:9px; height:9px; border-radius:999px; background:var(--accent); border:2px solid #fff; box-shadow:0 0 0 1px var(--gold-border); }\n  .flow-step:first-child .dot { display:none; }\n  @media (max-width:920px) { .flow { grid-template-columns:1fr; } .flow-step { border-inline-end:none; border-bottom:1px solid var(--line); } .flow-step:last-child { border-bottom:none; } .flow-step .dot { inset-inline-start:50%; top:-5px; transform:translateX(50%); } }\n\n  /* MODAL VIEWER */\n  .viewer-backdrop {\n    position:fixed; inset:0; background:rgba(15,15,15,0.66); z-index:200;\n    display:none; align-items:stretch; justify-content:stretch;\n    backdrop-filter:blur(4px);\n  }\n  .viewer-backdrop.open { display:flex; }\n  .viewer {\n    margin:auto; width:100%; height:100%;\n    display:flex; flex-direction:column; background:var(--bg);\n    animation: vIn .25s ease;\n  }\n  @keyframes vIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }\n  .viewer-bar {\n    height:56px; padding:0 16px;\n    background:#fff; border-bottom:1px solid var(--line);\n    display:flex; align-items:center; gap:16px; flex-shrink:0;\n  }\n  .viewer-title { font-size:14px; font-weight:600; }\n  .viewer-tag { font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-3); }\n  .viewer-actions { margin-inline-start:auto; display:flex; align-items:center; gap:8px; }\n  .viewer-frame { flex:1; min-height:0; background:#fff; }\n  .viewer-frame iframe { width:100%; height:100%; border:0; display:block; }\n\n  /* FOOTER */\n  footer { border-top:1px solid var(--line); margin-top:48px; padding:36px 24px; background:#fff; }\n  footer .inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; }\n  footer .legal { font-size:12px; color:var(--ink-3); }\n  footer .links { display:flex; gap:18px; font-size:13px; color:var(--ink-2); }\n  footer .links a { text-decoration:none; }\n  footer .links a:hover { color:var(--ink); }\n\n  /* Hero visual */\n  .hero-visual {\n    margin-top:48px;\n    border:1px solid var(--line); border-radius:18px; overflow:hidden;\n    background:#fff;\n    box-shadow: 0 24px 60px -20px rgba(20,30,50,0.18), 0 1px 2px rgba(0,0,0,0.04);\n    position:relative;\n  }\n  .hero-visual .preview {\n    height:520px; position:relative; overflow:hidden;\n  }\n  .hero-visual iframe {\n    position:absolute; top:0; left:0;\n    width:166%; height:166%;\n    border:0;\n    transform:scale(0.6);\n    transform-origin:top right;\n    pointer-events:none;\n  }\n  .hero-overlay-pill {\n    position:absolute; top:18px; inset-inline-end:18px;\n    background:rgba(255,255,255,0.95);\n    backdrop-filter:blur(10px);\n    border:1px solid var(--line);\n    border-radius:999px;\n    padding:6px 12px 6px 6px;\n    display:inline-flex; align-items:center; gap:8px;\n    font-size:12px; font-weight:500;\n    box-shadow: 0 4px 14px rgba(0,0,0,0.08);\n  }\n  .hero-overlay-pill .dot { width:8px; height:8px; border-radius:999px; background:var(--ok); box-shadow:0 0 0 3px var(--ok-soft); }\n\n  /* Github banner */\n  .gh-strip {\n    background: var(--primary-deep); color:#fff;\n    padding:12px 24px; font-size:13px;\n    display:flex; align-items:center; justify-content:center; gap:10px;\n  }\n  .gh-strip a { color:var(--gold-soft); text-decoration:underline; font-weight:500; }\n  .gh-strip i { width:14px; height:14px; }\n\n  /* responsive screens */\n  @media (max-width:520px) {\n    .screen-card .preview { height:200px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- top strip -->\n<div class=\"gh-strip\">\n  <i data-lucide=\"github\"><\u002Fi>\n  <span>פרויקט עיצוב פתוח · LawDesk Design Showcase<\u002Fspan>\n  <span style=\"opacity:.5\">·<\u002Fspan>\n  <a href=\"#screens\">צפה במסכים ↓<\u002Fa>\n<\u002Fdiv>\n\n<!-- nav -->\n<nav class=\"nav\">\n  <div class=\"nav-inner\">\n    <a href=\"#\" class=\"wordmark\">\n      <span class=\"glyph\"><\u002Fspan>\n      <span>LawDesk<span class=\"dot\">.<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#about\">אודות<\u002Fa>\n      <a href=\"#flow\">הזרימה<\u002Fa>\n      <a href=\"#screens\">המסכים<\u002Fa>\n      <a href=\"#principles\">עקרונות<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-cta\">\n      <a href=\"LawDesk.html\" class=\"btn btn-ghost btn-sm\" target=\"_blank\" rel=\"noopener\">\n        <i data-lucide=\"external-link\" style=\"width:13px;height:13px\"><\u002Fi>\n        עמוד הנחיתה\n      <\u002Fa>\n      <a href=\"#\" id=\"launchDemo\" class=\"btn btn-accent btn-sm\">\n        <i data-lucide=\"play\" style=\"width:13px;height:13px\"><\u002Fi>\n        הפעל דמו אינטראקטיבי\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<header class=\"hero\">\n  <div class=\"hero-inner\">\n    <div class=\"eyebrow\">\n      <span class=\"dash\"><\u002Fspan>\n      Design showcase · 6 artifacts · 19 screens · Hebrew RTL\n    <\u002Fdiv>\n    <h1 class=\"hero-title\">\n      איך נראית תוכנת עורכי דין\n      <span class=\"accent-mark\">כשעיצוב לוקח את עצמו ברצינות.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"hero-sub\">\n      LawDesk הוא פרויקט עיצוב מקיף לפלטפורמת SaaS משפטית — חוזים חכמים, בנייה אוטומטית של תבניות, וחתימה דיגיטלית. כל המסכים, המערכת, וחוויית הלקוח — בעברית, RTL, מהקרקע ועד לגג.\n    <\u002Fp>\n\n    <div style=\"display:flex; gap:12px; flex-wrap:wrap;\">\n      <a href=\"#\" id=\"launchDemoHero\" class=\"btn btn-accent btn-lg\">\n        <i data-lucide=\"play\" style=\"width:16px;height:16px\"><\u002Fi>\n        הפעל דמו אינטראקטיבי\n      <\u002Fa>\n      <a href=\"#screens\" class=\"btn btn-ghost btn-lg\">\n        <i data-lucide=\"layout-grid\" style=\"width:16px;height:16px\"><\u002Fi>\n        או דפדף במסכים\n      <\u002Fa>\n    <\u002Fdiv>\n    <p style=\"font-size:13px; color:var(--ink-3); margin-top:14px;\">\n      <i data-lucide=\"info\" style=\"width:13px;height:13px;display:inline;vertical-align:-2px\"><\u002Fi>\n      הדמו האינטראקטיבי מחבר בין המסכים לזרימה אחת רציפה — בדיוק כמו במוצר האמיתי.\n    <\u002Fp>\n\n    <div class=\"hero-meta\">\n      <div class=\"hero-stat\"><div class=\"num\">6<\u002Fdiv><div class=\"lbl\">artifacts<\u002Fdiv><\u002Fdiv>\n      <div class=\"hero-stat\"><div class=\"num\">19<\u002Fdiv><div class=\"lbl\">screens<\u002Fdiv><\u002Fdiv>\n      <div class=\"hero-stat\"><div class=\"num\">3<\u002Fdiv><div class=\"lbl\">flows<\u002Fdiv><\u002Fdiv>\n      <div class=\"hero-stat\"><div class=\"num\">RTL<\u002Fdiv><div class=\"lbl\">hebrew · arabic-ready<\u002Fdiv><\u002Fdiv>\n      <div class=\"hero-stat\"><div class=\"num\">100%<\u002Fdiv><div class=\"lbl\">html · self-contained<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-visual\">\n      <div class=\"preview\">\n        <iframe src=\"LawDesk.html\" loading=\"lazy\" title=\"Landing preview\"><\u002Fiframe>\n        <div class=\"hero-overlay-pill\">\n          <span class=\"dot\"><\u002Fspan>\n          <span>Live preview · LawDesk.html<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ABOUT -->\n<section class=\"sec\" id=\"about\" style=\"padding-top:48px;\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>על הפרויקט<\u002Fdiv>\n        <h2>מערכת עיצוב שלמה — לא רק כמה מסכים יפים.<\u002Fh2>\n      <\u002Fdiv>\n      <p>\n        כל אחד מששת הקבצים ב-showcase הזה הוא יישום ממשי של אותה מערכת עיצוב: צבעים, טיפוגרפיה, ריווח, אינטראקציות. הם נבנו כדי לעבוד יחד — והכי חשוב, כדי לשרת עורכי דין שלא רוצים ללמוד עוד תוכנה.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FLOW -->\n<section class=\"sec\" id=\"flow\" style=\"padding-top:0;\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head\" style=\"margin-bottom:24px;\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>הזרימה השלמה<\u002Fdiv>\n        <h2>מהפעם הראשונה שנפגשים עם המוצר — עד החתימה.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"flow\">\n      <div class=\"flow-step\"><div class=\"dot\"><\u002Fdiv>\n        <div class=\"step-num\">01 · MARKETING<\u002Fdiv>\n        <h4>נחיתה ושכנוע<\u002Fh4>\n        <p>עו״ד מגיע לעמוד הנחיתה, מבין את הערך, נרשם.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flow-step\"><div class=\"dot\"><\u002Fdiv>\n        <div class=\"step-num\">02 · DASHBOARD<\u002Fdiv>\n        <h4>לוח בקרה ראשי<\u002Fh4>\n        <p>סקירה יומית — מה ממתין, מה לחתום, מה דחוף.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flow-step\"><div class=\"dot\"><\u002Fdiv>\n        <div class=\"step-num\">03 · TEMPLATES<\u002Fdiv>\n        <h4>בניית תבניות<\u002Fh4>\n        <p>AI מחלץ מחוזים קיימים, או בנייה ידנית בעורך עץ ההחלטות.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flow-step\"><div class=\"dot\"><\u002Fdiv>\n        <div class=\"step-num\">04 · GENERATE<\u002Fdiv>\n        <h4>יצירת מסמך<\u002Fh4>\n        <p>שאלון קצר, מסמך מתחבר אוטומטית, מוכן לשליחה.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flow-step\"><div class=\"dot\"><\u002Fdiv>\n        <div class=\"step-num\">05 · SIGN<\u002Fdiv>\n        <h4>הלקוח חותם<\u002Fh4>\n        <p>בטלפון, ב-90 שניות, ללא אפליקציה — דרך SMS.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SCREENS -->\n<section class=\"sec\" id=\"screens\" style=\"background:#fff; border-top:1px solid var(--line); border-bottom:1px solid var(--line);\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>המסכים<\u002Fdiv>\n        <h2>שישה ארטיפקטים. לחץ על אחד כדי לפתוח אותו במסך מלא.<\u002Fh2>\n      <\u002Fdiv>\n      <p>כל ארטיפקט הוא קובץ HTML עצמאי. אפשר לפתוח ישירות בלשונית חדשה, או לראות אותו פה בתצוגת תצוגה מקדימה.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"screens-grid\">\n\n      <!-- 01 Landing -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"LawDesk.html\" data-res=\"screenLanding\" data-title=\"עמוד נחיתה · LawDesk Marketing\">\n        <div class=\"preview\">\n          <iframe src=\"LawDesk.html\" loading=\"lazy\" title=\"Landing preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">01 · MARKETING<\u002Fdiv>\n          <div class=\"title\">עמוד נחיתה<\u002Fdiv>\n          <div class=\"desc\">מערכת עיצוב מלאה + עמוד שיווקי בעברית. Hero, social proof, decision-tree wow, מחירים, שאלות נפוצות.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip navy\">Marketing<\u002Fspan>\n            <span class=\"chip\">Design System<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 02 Dashboard -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"Dashboard.html\" data-res=\"screenDashboard\" data-title=\"לוח בקרה לעו״ד · Lawyer Dashboard\">\n        <div class=\"preview\">\n          <iframe src=\"Dashboard.html\" loading=\"lazy\" title=\"Dashboard preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">02 · APP · DASHBOARD<\u002Fdiv>\n          <div class=\"title\">לוח בקרה לעו״ד<\u002Fdiv>\n          <div class=\"desc\">המסך הראשי לאחר התחברות. סטטיסטיקות, ממתינים לחתימה, תיקים אחרונים, כלים מהירים, ובאנר עדכון מוצר.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip navy\">App<\u002Fspan>\n            <span class=\"chip\">15 כלים מהירים<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 03 Extraction -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"Extraction Flow.html\" data-res=\"screenExtraction\" data-title=\"חילוץ AI לתבניות · Template Extraction\">\n        <div class=\"preview\">\n          <iframe src=\"Extraction Flow.html\" loading=\"lazy\" title=\"Extraction preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">03 · APP · AI EXTRACTION<\u002Fdiv>\n          <div class=\"title\">חילוץ תבנית באמצעות AI<\u002Fdiv>\n          <div class=\"desc\">שלושה מסכים רצופים: העלאה, ניתוח, סקירה. Side-by-side עם המסמכים המקוריים — ה-AI מציג את העבודה.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip gold\">The wow moment<\u002Fspan>\n            <span class=\"chip\">3 screens<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 04 Document Generation -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"Document Generation.html\" data-res=\"screenGeneration\" data-title=\"יצירת מסמך · Document Generation\">\n        <div class=\"preview\">\n          <iframe src=\"Document Generation.html\" loading=\"lazy\" title=\"Document gen preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">04 · APP · GENERATE<\u002Fdiv>\n          <div class=\"title\">יצירת מסמך מתבנית<\u002Fdiv>\n          <div class=\"desc\">שלושה מסכים: בחירת תבנית, שאלון בסגנון Typeform עם תצוגה מקדימה חיה, ושליחה לחתימה.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip navy\">Wizard<\u002Fspan>\n            <span class=\"chip\">Live preview<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 05 Client Signing -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"Client Signing.html\" data-res=\"screenSigning\" data-title=\"חתימת לקוח במובייל · Mobile Signing\">\n        <div class=\"preview\">\n          <iframe src=\"Client Signing.html\" loading=\"lazy\" title=\"Signing preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">05 · MOBILE · CLIENT<\u002Fdiv>\n          <div class=\"title\">חתימת לקוח במובייל<\u002Fdiv>\n          <div class=\"desc\">ארבעה מסכים בטלפון: נחיתה, OTP, חתימה, אישור. White-label למשרד עורכי הדין — לא LawDesk.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip ok\">Mobile · 375px<\u002Fspan>\n            <span class=\"chip\">4 screens<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- 06 Template Builder -->\n      <a class=\"screen-card\" href=\"#\" data-open=\"Template Builder.html\" data-res=\"screenBuilder\" data-title=\"עורך תבניות · Template Builder\">\n        <div class=\"preview\">\n          <iframe src=\"Template Builder.html\" loading=\"lazy\" title=\"Builder preview\"><\u002Fiframe>\n          <div class=\"preview-mask\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"num\">06 · APP · BUILDER<\u002Fdiv>\n          <div class=\"title\">עורך תבניות מתקדם<\u002Fdiv>\n          <div class=\"desc\">בניה ידנית של עץ החלטות, עם canvas + inspector, עורך טקסט עשיר, ובונה תנאים ויזואלי לסעיפים מותנים.<\u002Fdiv>\n          <div class=\"meta\">\n            <span class=\"chip navy\">Power tool<\u002Fspan>\n            <span class=\"chip\">Visual rule builder<\u002Fspan>\n            <span class=\"open-link\">פתח <i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRINCIPLES -->\n<section class=\"sec\" id=\"principles\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>עקרונות עיצוב<\u002Fdiv>\n        <h2>מה הנחה את העבודה.<\u002Fh2>\n      <\u002Fdiv>\n      <p>חמישה עקרונות שחזרו על עצמם בכל אחד מששת המסכים. הם לא תיאורטיים — הם נראים בכל פיקסל.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"principles\">\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"languages\"><\u002Fi><\u002Fdiv>\n        <h3>RTL ראשונה, לא מאוחר יותר<\u002Fh3>\n        <p>כל פריסה, כל אייקון כיווני, כל אנימציה — תוכננה מההתחלה לעברית. לא תרגום של עיצוב אנגלי.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"scale\"><\u002Fi><\u002Fdiv>\n        <h3>שקט, לא צבעוני<\u002Fh3>\n        <p>פלטה של navy + gold + נייר עתיק. הצבע הסטורי היחיד הוא הזהב — הוא משמש לפעולה, אף פעם לא לקישוט.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"eye\"><\u002Fi><\u002Fdiv>\n        <h3>ה-AI חייב להראות את עבודתו<\u002Fh3>\n        <p>במסך החילוץ, כל מה שה-AI ״מצא״ מודגש על המסמך המקורי. עורך דין לא יסמוך על קופסה שחורה.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"smartphone\"><\u002Fi><\u002Fdiv>\n        <h3>הלקוח לא יודע מה זה OTP<\u002Fh3>\n        <p>חוויית החתימה במובייל מנוסחת בעברית של בני אדם. ״קוד אימות״, לא ״OTP״. ״שלח״, לא ״submit״.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"layers\"><\u002Fi><\u002Fdiv>\n        <h3>גבולות במקום צללים<\u002Fh3>\n        <p>המערכת משתמשת בקווים דקים ועיצוב שטוח, לא בצללים מוגזמים. נקי, מקצועי, נטול אופנה.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"ico\"><i data-lucide=\"git-merge\"><\u002Fi><\u002Fdiv>\n        <h3>מסמכים שמראים את עצמם<\u002Fh3>\n        <p>בכל שלב ביצירה, התצוגה המקדימה החיה רואה את המסמך מתעצב. שום שלב הוא לא ״תאמין לי״.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"sec\" style=\"padding-top:24px;\">\n  <div class=\"sec-inner\">\n    <div style=\"background:var(--primary-deep); border-radius:18px; padding:56px 40px; color:#fff; text-align:center; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-40px; left:-40px; width:240px; height:240px; background:radial-gradient(circle, rgba(191,143,0,0.18), transparent 70%); pointer-events:none;\"><\u002Fdiv>\n      <h2 style=\"font-size:32px; font-weight:600; letter-spacing:-0.01em; margin:0 0 12px;\">מוכן/ה לחקור?<\u002Fh2>\n      <p style=\"color:rgba(255,255,255,0.72); font-size:15px; max-width:560px; margin:0 auto 28px; line-height:1.55;\">כל ששת המסכים פתוחים לעיון — לחץ למעלה כדי לקפוץ ישירות אליהם, או הורד את הקוד מ-GitHub.<\u002Fp>\n      <div style=\"display:flex; gap:12px; justify-content:center; flex-wrap:wrap;\">\n        <a href=\"#screens\" class=\"btn btn-accent btn-lg\">\n          <i data-lucide=\"layout-grid\" style=\"width:16px;height:16px\"><\u002Fi>\n          חקור את כל המסכים\n        <\u002Fa>\n        <a href=\"https://github.com\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-lg\" style=\"background:transparent; border:1px solid rgba(255,255,255,0.25); color:#fff;\">\n          <i data-lucide=\"github\" style=\"width:16px;height:16px\"><\u002Fi>\n          הצג קוד ב-GitHub\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"inner\">\n    <div class=\"legal\">© 2026 LawDesk Design Showcase · Built with vanilla HTML, CSS, and care<\u002Fdiv>\n    <div class=\"links\">\n      <a href=\"LawDesk.html\" target=\"_blank\" rel=\"noopener\">Landing<\u002Fa>\n      <a href=\"Dashboard.html\" target=\"_blank\" rel=\"noopener\">Dashboard<\u002Fa>\n      <a href=\"Extraction Flow.html\" target=\"_blank\" rel=\"noopener\">Extraction<\u002Fa>\n      <a href=\"Document Generation.html\" target=\"_blank\" rel=\"noopener\">Generate<\u002Fa>\n      <a href=\"Client Signing.html\" target=\"_blank\" rel=\"noopener\">Signing<\u002Fa>\n      <a href=\"Template Builder.html\" target=\"_blank\" rel=\"noopener\">Builder<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- DEMO SHELL — orchestrated multi-screen experience -->\n<div class=\"viewer-backdrop\" id=\"demoShell\">\n  <div class=\"viewer\">\n    <div class=\"viewer-bar\" style=\"background:var(--primary-deep); color:#fff; border-bottom-color:rgba(255,255,255,0.1);\">\n      <button class=\"btn btn-sm\" id=\"demoClose\" style=\"background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2);\">\n        <i data-lucide=\"x\" style=\"width:14px;height:14px\"><\u002Fi>\n        יציאה\n      <\u002Fbutton>\n\n      <div style=\"display:flex; align-items:center; gap:8px;\">\n        <span style=\"font-family:ui-monospace,monospace; font-size:11px; color:var(--gold-soft); letter-spacing:.1em;\">DEMO MODE<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Step nav -->\n      <div id=\"demoSteps\" style=\"display:flex; gap:4px; margin-inline-start:16px; flex:1; flex-wrap:wrap;\">\n        <!-- populated by JS -->\n      <\u002Fdiv>\n\n      <div class=\"viewer-actions\">\n        <button class=\"btn btn-sm\" id=\"demoPrev\" style=\"background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2);\">\n          <i data-lucide=\"arrow-right\" style=\"width:13px;height:13px\"><\u002Fi>\n          הקודם\n        <\u002Fbutton>\n        <button class=\"btn btn-accent btn-sm\" id=\"demoNext\">\n          הבא\n          <i data-lucide=\"arrow-left\" style=\"width:13px;height:13px\"><\u002Fi>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Step caption -->\n    <div id=\"demoCaption\" style=\"background:#fff; border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:center; gap:14px;\">\n      <div style=\"width:36px; height:36px; border-radius:8px; background:var(--gold-soft); border:1px solid var(--gold-border); display:grid; place-items:center; flex-shrink:0;\">\n        <i data-lucide=\"sparkles\" style=\"width:16px;height:16px;color:#6B5000\" id=\"capIcon\"><\u002Fi>\n      <\u002Fdiv>\n      <div style=\"flex:1; min-width:0;\">\n        <div id=\"capTitle\" style=\"font-size:14px; font-weight:600;\">—<\u002Fdiv>\n        <div id=\"capDesc\" style=\"font-size:12px; color:var(--ink-2); margin-top:2px;\">—<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"capProgress\" style=\"font-family:ui-monospace,monospace; font-size:11px; color:var(--ink-3); letter-spacing:.1em;\">1 / 6<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"viewer-frame\" style=\"position:relative;\">\n      <iframe id=\"demoFrame\" src=\"about:blank\" title=\"demo screen\" style=\"width:100%; height:100%; border:0; display:block;\"><\u002Fiframe>\n\n      <!-- Onboarding hint that appears on first step -->\n      <div id=\"demoHint\" style=\"position:absolute; bottom:24px; inset-inline-end:24px; max-width:300px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; box-shadow:0 12px 32px rgba(0,0,0,0.18); pointer-events:auto; display:none; z-index:5;\">\n        <div style=\"display:flex; align-items:start; gap:10px;\">\n          <div style=\"width:28px; height:28px; border-radius:6px; background:var(--gold-soft); display:grid; place-items:center; flex-shrink:0;\">\n            <i data-lucide=\"lightbulb\" style=\"width:14px;height:14px;color:#6B5000\"><\u002Fi>\n          <\u002Fdiv>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-size:13px; font-weight:600; margin-bottom:4px;\">טיפ<\u002Fdiv>\n            <div id=\"hintText\" style=\"font-size:12px; color:var(--ink-2); line-height:1.5;\">הקצר/הארוך כפתורי \"הבא\" / \"הקודם\" כדי לעבור בין שלבי המוצר.<\u002Fdiv>\n          <\u002Fdiv>\n          <button id=\"hintClose\" style=\"background:none; border:none; color:var(--ink-3); cursor:pointer; padding:0;\">\n            <i data-lucide=\"x\" style=\"width:13px;height:13px\"><\u002Fi>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FULL-SCREEN VIEWER -->\n<div class=\"viewer-backdrop\" id=\"viewer\">\n  <div class=\"viewer\">\n    <div class=\"viewer-bar\">\n      <button class=\"btn btn-ghost btn-sm\" id=\"vClose\">\n        <i data-lucide=\"x\" style=\"width:14px;height:14px\"><\u002Fi>\n        סגור\n      <\u002Fbutton>\n      <div>\n        <div class=\"viewer-title\" id=\"vTitle\">—<\u002Fdiv>\n        <div class=\"viewer-tag\" id=\"vTag\" dir=\"ltr\">—<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viewer-actions\">\n        <a class=\"btn btn-ghost btn-sm\" id=\"vNew\" target=\"_blank\" rel=\"noopener\">\n          <i data-lucide=\"external-link\" style=\"width:13px;height:13px\"><\u002Fi>\n          פתח בלשונית חדשה\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"viewer-frame\">\n      <iframe id=\"vFrame\" src=\"about:blank\" title=\"screen viewer\"><\u002Fiframe>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Open viewer on screen-card click\n  document.querySelectorAll('[data-open]').forEach(el => {\n    el.addEventListener('click', (e) => {\n      e.preventDefault();\n      const path = el.getAttribute('data-open');\n      const resKey = el.getAttribute('data-res');\n      const resolved = (resKey && window.__resources && window.__resources[resKey]) || path;\n      const title = el.getAttribute('data-title') || path;\n      document.getElementById('vTitle').textContent = title;\n      document.getElementById('vTag').textContent = path;\n      document.getElementById('vNew').setAttribute('href', resolved);\n      document.getElementById('vFrame').setAttribute('src', resolved);\n      document.getElementById('viewer').classList.add('open');\n      document.body.style.overflow = 'hidden';\n    });\n  });\n\n  function closeViewer() {\n    document.getElementById('viewer').classList.remove('open');\n    document.getElementById('vFrame').setAttribute('src', 'about:blank');\n    document.body.style.overflow = '';\n  }\n  document.getElementById('vClose').addEventListener('click', closeViewer);\n  document.getElementById('viewer').addEventListener('click', (e) => {\n    if (e.target.id === 'viewer') closeViewer();\n  });\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape') closeViewer();\n  });\n\n  // ===== DEMO SHELL — orchestrated flow =====\n  const demoSteps = [\n    {\n      file: 'LawDesk.html',\n      resKey: 'screenLanding',\n      title: '1. גילוי המוצר',\n      desc: 'עו״ד מגיע/ה לעמוד הנחיתה ולומד/ת על הערך של LawDesk.',\n      hint: 'גלול/י למטה כדי לראות את עמוד הנחיתה. כשתסיים/י — לחץ/י \"הבא\".',\n      icon: 'globe'\n    },\n    {\n      file: 'Dashboard.html',\n      resKey: 'screenDashboard',\n      title: '2. כניסה ללוח הבקרה',\n      desc: 'לאחר ההרשמה — המסך הראשי. סקירה יומית, ממתינים לחתימה, וכלים מהירים.',\n      hint: 'שים/י לב לקטע \"כלים מהירים\" — 15 כלים יומיומיים לעו״ד.',\n      icon: 'layout-dashboard'\n    },\n    {\n      file: 'Extraction Flow.html',\n      resKey: 'screenExtraction',\n      title: '3. בניית תבנית עם AI',\n      desc: 'העלאת חוזים קיימים, ה-AI מחלץ משתנים וסעיפים מותנים, וסקירה בצד-של-צד.',\n      hint: 'זה הרגע של ה־\"וואו\" — לחץ/י על המסכים השונים כדי לראות את התהליך.',\n      icon: 'sparkles'\n    },\n    {\n      file: 'Template Builder.html',\n      resKey: 'screenBuilder',\n      title: '4. עידון התבנית ידנית',\n      desc: 'עורך עץ ההחלטות — בנייה ויזואלית של תנאים וסעיפים מותנים.',\n      hint: 'בונה התנאים בצד ימין הוא ויזואלי לחלוטין — אין JSON, אין קוד.',\n      icon: 'git-branch'\n    },\n    {\n      file: 'Document Generation.html',\n      resKey: 'screenGeneration',\n      title: '5. יצירת מסמך לתיק',\n      desc: 'שאלון בסגנון Typeform עם תצוגה מקדימה חיה של המסמך.',\n      hint: 'התצוגה המקדימה מתעדכנת בכל תשובה — הלקוח רואה את המסמך נבנה בזמן אמת.',\n      icon: 'file-edit'\n    },\n    {\n      file: 'Client Signing.html',\n      resKey: 'screenSigning',\n      title: '6. הלקוח חותם בטלפון',\n      desc: 'חוויית white-label בעיצוב המשרד — לא של LawDesk. SMS, אימות, חתימה, אישור.',\n      hint: 'ארבעה מסכים בטלפון — מנחיתה דרך SMS ועד אישור החתימה.',\n      icon: 'smartphone'\n    }\n  ];\n\n  let demoIdx = 0;\n  const demoShell = document.getElementById('demoShell');\n  const demoFrame = document.getElementById('demoFrame');\n  const demoStepsEl = document.getElementById('demoSteps');\n\n  function renderDemoSteps() {\n    demoStepsEl.innerHTML = demoSteps.map((s, i) => {\n      const active = i === demoIdx;\n      const done = i < demoIdx;\n      return `<button data-idx=\"${i}\" style=\"\n        background:${active ? '#fff' : (done ? 'rgba(191,143,0,0.25)' : 'rgba(255,255,255,0.06)')};\n        color:${active ? 'var(--ink)' : '#fff'};\n        border:1px solid ${active ? '#fff' : 'rgba(255,255,255,0.15)'};\n        height:28px; padding:0 11px; border-radius:6px;\n        font-family:inherit; font-size:12px; font-weight:500; cursor:pointer;\n        display:inline-flex; align-items:center; gap:6px;\n        transition:.15s;\n      \">\n        <span style=\"font-family:ui-monospace,monospace; font-size:10px; opacity:.7;\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n        <span>${s.title.replace(/^\\d+\\.\\s*/, '')}<\u002Fspan>\n        ${done ? '<i data-lucide=\"check\" style=\"width:11px;height:11px\"><\u002Fi>' : ''}\n      <\u002Fbutton>`;\n    }).join('');\n\n    demoStepsEl.querySelectorAll('button[data-idx]').forEach(b => {\n      b.addEventListener('click', () => goToDemo(parseInt(b.getAttribute('data-idx'))));\n    });\n    if (window.lucide && lucide.createIcons) lucide.createIcons();\n  }\n\n  function goToDemo(idx) {\n    demoIdx = Math.max(0, Math.min(demoSteps.length - 1, idx));\n    const s = demoSteps[demoIdx];\n    demoFrame.setAttribute('src', (window.__resources && window.__resources[s.resKey]) || s.file);\n    document.getElementById('capTitle').textContent = s.title;\n    document.getElementById('capDesc').textContent = s.desc;\n    document.getElementById('capProgress').textContent = `${demoIdx+1} / ${demoSteps.length}`;\n    document.getElementById('hintText').textContent = s.hint;\n    document.getElementById('demoHint').style.display = 'block';\n\n    // Update icon\n    const capIcon = document.getElementById('capIcon');\n    capIcon.setAttribute('data-lucide', s.icon);\n\n    // Prev/Next state\n    document.getElementById('demoPrev').style.opacity = demoIdx === 0 ? '0.4' : '1';\n    document.getElementById('demoPrev').style.pointerEvents = demoIdx === 0 ? 'none' : '';\n    const nextBtn = document.getElementById('demoNext');\n    if (demoIdx === demoSteps.length - 1) {\n      nextBtn.innerHTML = '<i data-lucide=\"check\" style=\"width:13px;height:13px\"><\u002Fi> סיים דמו';\n    } else {\n      nextBtn.innerHTML = 'הבא <i data-lucide=\"arrow-left\" style=\"width:13px;height:13px\"><\u002Fi>';\n    }\n\n    renderDemoSteps();\n  }\n\n  function openDemo() {\n    demoIdx = 0;\n    demoShell.classList.add('open');\n    document.body.style.overflow = 'hidden';\n    goToDemo(0);\n  }\n  function closeDemo() {\n    demoShell.classList.remove('open');\n    demoFrame.setAttribute('src', 'about:blank');\n    document.body.style.overflow = '';\n  }\n\n  document.getElementById('launchDemo').addEventListener('click', (e) => { e.preventDefault(); openDemo(); });\n  document.getElementById('launchDemoHero').addEventListener('click', (e) => { e.preventDefault(); openDemo(); });\n  document.getElementById('demoClose').addEventListener('click', closeDemo);\n  document.getElementById('demoNext').addEventListener('click', () => {\n    if (demoIdx === demoSteps.length - 1) closeDemo();\n    else goToDemo(demoIdx + 1);\n  });\n  document.getElementById('demoPrev').addEventListener('click', () => goToDemo(demoIdx - 1));\n  document.getElementById('hintClose').addEventListener('click', () => {\n    document.getElementById('demoHint').style.display = 'none';\n  });\n\n  document.addEventListener('keydown', (e) => {\n    if (!demoShell.classList.contains('open')) return;\n    if (e.key === 'ArrowLeft') document.getElementById('demoNext').click();\n    if (e.key === 'ArrowRight' && demoIdx > 0) goToDemo(demoIdx - 1);\n    if (e.key === 'Escape') closeDemo();\n  });\n\n  if (window.lucide && lucide.createIcons) lucide.createIcons();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
